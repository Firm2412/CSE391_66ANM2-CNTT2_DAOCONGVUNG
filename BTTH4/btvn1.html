<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 2.1 - Form Đăng Ký (Nâng cấp)</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f4f9; display: flex; justify-content: center; padding: 50px; }
        .form-container { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 400px; }
        .form-group { margin-bottom: 15px; position: relative; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; }
        .form-group input[type="text"], 
        .form-group input[type="email"], 
        .form-group input[type="password"] {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .form-group input.is-invalid { border-color: red; background-color: #ffe6e6; }
        .error-message { color: red; font-size: 0.85em; margin-top: 5px; display: block; min-height: 16px; }
        button[type="submit"] { width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; }
        button[type="submit"]:hover { background-color: #218838; }
        #successMessage { text-align: center; color: #28a745; font-size: 1.2em; font-weight: bold; margin-top: 20px; display: none; }
        
        .char-count { font-size: 0.85em; color: #666; position: absolute; right: 0; top: 0; }
        
        .password-wrapper { position: relative; display: flex; align-items: center; }
        .toggle-password { position: absolute; right: 10px; background: none; border: none; cursor: pointer; font-size: 1.2em; padding: 0; }
        
        .strength-meter { height: 5px; background-color: #e0e0e0; border-radius: 3px; margin-top: 5px; overflow: hidden; }
        .strength-bar { height: 100%; width: 0; transition: width 0.3s, background-color 0.3s; }
        .strength-text { font-size: 0.85em; margin-top: 3px; display: block; font-weight: bold; }
    </style>
</head>
<body>

<div class="form-container">
    <h2 id="formTitle">Đăng Ký Tài Khoản</h2>
    <form id="registerForm">
        <div class="form-group">
            <label for="fullname">Họ và tên</label>
            <span class="char-count" id="fullnameCount">0/50</span>
            <input type="text" id="fullname" maxlength="50">
            <span class="error-message" id="fullname-error"></span>
        </div>

        <div class="form-group">
            <label for="email">Email</label>
            <input type="email" id="email">
            <span class="error-message" id="email-error"></span>
        </div>

        <div class="form-group">
            <label for="phone">Số điện thoại</label>
            <input type="text" id="phone">
            <span class="error-message" id="phone-error"></span>
        </div>

        <div class="form-group">
            <label for="password">Mật khẩu</label>
            <div class="password-wrapper">
                <input type="password" id="password">
                <button type="button" class="toggle-password" id="togglePassword">👁</button>
            </div>
            <div class="strength-meter">
                <div class="strength-bar" id="strengthBar"></div>
            </div>
            <span class="strength-text" id="strengthText"></span>
            <span class="error-message" id="password-error"></span>
        </div>

        <div class="form-group">
            <label for="confirmPassword">Xác nhận mật khẩu</label>
            <input type="password" id="confirmPassword">
            <span class="error-message" id="confirmPassword-error"></span>
        </div>

        <div class="form-group">
            <label>Giới tính</label>
            <input type="radio" name="gender" value="Nam" id="genderMale"> Nam
            <input type="radio" name="gender" value="Nữ" id="genderFemale"> Nữ
            <span class="error-message" id="gender-error"></span>
        </div>

        <div class="form-group">
            <input type="checkbox" id="terms"> Tôi đồng ý với các điều khoản
            <span class="error-message" id="terms-error"></span>
        </div>

        <button type="submit">Đăng Ký</button>
    </form>
    
    <div id="successMessage"></div>
</div>

<script>
    function showError(fieldId, message) {
        document.getElementById(fieldId + '-error').innerText = message;
        const inputElement = document.getElementById(fieldId);
        if (inputElement && inputElement.type !== 'radio' && inputElement.type !== 'checkbox') {
            inputElement.classList.add('is-invalid');
        }
    }

    function clearError(fieldId) {
        document.getElementById(fieldId + '-error').innerText = '';
        const inputElement = document.getElementById(fieldId);
        if (inputElement && inputElement.type !== 'radio' && inputElement.type !== 'checkbox') {
            inputElement.classList.remove('is-invalid');
        }
    }

    function validateFullname() {
        const value = document.getElementById('fullname').value.trim();
        const regex = /^[\p{L}\s]{3,}$/u; 
        
        if (value === '') {
            showError('fullname', 'Họ và tên không được để trống.');
            return false;
        } else if (!regex.test(value)) {
            showError('fullname', 'Họ tên phải từ 3 ký tự, chỉ chứa chữ cái và khoảng trắng.');
            return false;
        }
        clearError('fullname');
        return true;
    }

    function validateEmail() {
        const value = document.getElementById('email').value.trim();
        const regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        
        if (value === '') {
            showError('email', 'Email không được để trống.');
            return false;
        } else if (!regex.test(value)) {
            showError('email', 'Email không đúng định dạng.');
            return false;
        }
        clearError('email');
        return true;
    }

    function validatePhone() {
        const value = document.getElementById('phone').value.trim();
        const regex = /^0\d{9}$/;
        
        if (value === '') {
            showError('phone', 'Số điện thoại không được để trống.');
            return false;
        } else if (!regex.test(value)) {
            showError('phone', 'Số điện thoại phải gồm 10 chữ số và bắt đầu bằng số 0.');
            return false;
        }
        clearError('phone');
        return true;
    }

    function validatePassword() {
        const value = document.getElementById('password').value;
        const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)[a-zA-Z\d\W]{8,}$/;
        
        if (value === '') {
            showError('password', 'Mật khẩu không được để trống.');
            return false;
        } else if (!regex.test(value)) {
            showError('password', 'Mật khẩu tối thiểu 8 ký tự, gồm chữ hoa, thường và số.');
            return false;
        }
        
        const confirmValue = document.getElementById('confirmPassword').value;
        if(confirmValue !== '') validateConfirmPassword();

        clearError('password');
        return true;
    }

    function validateConfirmPassword() {
        const password = document.getElementById('password').value;
        const confirmPassword = document.getElementById('confirmPassword').value;
        
        if (confirmPassword === '') {
            showError('confirmPassword', 'Vui lòng xác nhận lại mật khẩu.');
            return false;
        } else if (password !== confirmPassword) {
            showError('confirmPassword', 'Mật khẩu xác nhận không khớp.');
            return false;
        }
        clearError('confirmPassword');
        return true;
    }

    function validateGender() {
        const checkedGender = document.querySelector('input[name="gender"]:checked');
        if (!checkedGender) {
            showError('gender', 'Vui lòng chọn giới tính.');
            return false;
        }
        clearError('gender');
        return true;
    }

    function validateTerms() {
        const termsChecked = document.getElementById('terms').checked;
        if (!termsChecked) {
            showError('terms', 'Bạn phải đồng ý với các điều khoản.');
            return false;
        }
        clearError('terms');
        return true;
    }

    const fullnameInput = document.getElementById('fullname');
    const fullnameCount = document.getElementById('fullnameCount');
    
    fullnameInput.addEventListener('input', function() {
        fullnameCount.innerText = `${this.value.length}/50`;
        clearError('fullname');
    });

    const passwordInput = document.getElementById('password');
    const togglePasswordBtn = document.getElementById('togglePassword');
    const strengthBar = document.getElementById('strengthBar');
    const strengthText = document.getElementById('strengthText');

    togglePasswordBtn.addEventListener('click', function() {
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            this.innerText = 'Ẩn';
        } else {
            passwordInput.type = 'password';
            this.innerText = '👁';
        }
    });

    passwordInput.addEventListener('input', function() {
        const val = this.value;
        let strength = 0;
        
        if (val.length > 0) strength += 1;
        if (val.length >= 8) strength += 1;
        if (/[a-z]/.test(val) && /[A-Z]/.test(val)) strength += 1;
        if (/\d/.test(val)) strength += 1;
        if (/[^a-zA-Z\d]/.test(val)) strength += 1;

        if (val.length === 0) {
            strengthBar.style.width = '0';
            strengthText.innerText = '';
        } else if (strength <= 2) {
            strengthBar.style.width = '33%';
            strengthBar.style.backgroundColor = 'red';
            strengthText.innerText = 'Yếu';
            strengthText.style.color = 'red';
        } else if (strength === 3 || strength === 4) {
            strengthBar.style.width = '66%';
            strengthBar.style.backgroundColor = 'orange';
            strengthText.innerText = 'Trung bình';
            strengthText.style.color = 'orange';
        } else {
            strengthBar.style.width = '100%';
            strengthBar.style.backgroundColor = 'green';
            strengthText.innerText = 'Mạnh';
            strengthText.style.color = 'green';
        }
        
        clearError('password');
    });

    const fields = [
        { id: 'fullname', validateFunc: validateFullname },
        { id: 'email', validateFunc: validateEmail },
        { id: 'phone', validateFunc: validatePhone },
        { id: 'password', validateFunc: validatePassword },
        { id: 'confirmPassword', validateFunc: validateConfirmPassword }
    ];

    fields.forEach(field => {
        const element = document.getElementById(field.id);
        if (field.id !== 'fullname' && field.id !== 'password') {
            element.addEventListener('input', () => clearError(field.id));
        }
        element.addEventListener('blur', field.validateFunc);
    });

    document.querySelectorAll('input[name="gender"]').forEach(radio => {
        radio.addEventListener('change', () => clearError('gender'));
    });
    document.getElementById('terms').addEventListener('change', () => clearError('terms'));

    document.getElementById('registerForm').addEventListener('submit', function(event) {
        event.preventDefault();

        const isValid = validateFullname() 
                      & validateEmail() 
                      & validatePhone() 
                      & validatePassword() 
                      & validateConfirmPassword() 
                      & validateGender() 
                      & validateTerms();

        if (isValid) {
            this.style.display = 'none';
            document.getElementById('formTitle').style.display = 'none';
            
            const fullname = document.getElementById('fullname').value.trim();
            const successDiv = document.getElementById('successMessage');
            successDiv.innerHTML = `Đăng ký thành công! 🎉 <br> Chào mừng <b>${fullname}</b>.`;
            successDiv.style.display = 'block';
        }
    });
</script>

</body>
</html>
