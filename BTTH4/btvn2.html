<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 2.3 - Form Đăng Ký Nhiều Bước</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; display: flex; justify-content: center; padding: 40px 20px; }
        .container { background: #fff; width: 100%; max-width: 500px; padding: 30px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        
        h2 { text-align: center; color: #333; margin-bottom: 20px; }
        
        .progress-container { width: 100%; background-color: #e0e0e0; border-radius: 5px; margin-bottom: 25px; height: 10px; overflow: hidden; position: relative; }
        .progress-bar { height: 100%; background-color: #28a745; width: 0%; transition: width 0.3s ease; }
        .step-indicator { text-align: center; margin-bottom: 20px; font-weight: bold; color: #555; }

        .step { display: none; }
        .step.active { display: block; }

        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 5px; color: #444; }
        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group input[type="email"],
        .form-group input[type="password"] {
            width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 14px;
        }
        .form-group input.is-invalid { border-color: #dc3545; background-color: #f8d7da; }
        .error-message { color: #dc3545; font-size: 0.85em; display: block; min-height: 18px; margin-top: 4px; }

        .radio-group { display: flex; gap: 15px; margin-top: 8px; }

        .summary-box { background: #f8f9fa; padding: 15px; border-radius: 5px; border: 1px solid #ddd; line-height: 1.6; }
        .summary-box p { margin: 8px 0; }
        
        .buttons { display: flex; justify-content: space-between; margin-top: 25px; }
        button { padding: 10px 20px; border: none; border-radius: 4px; font-size: 16px; cursor: pointer; font-weight: bold; transition: background 0.2s; }
        .btn-prev { background-color: #6c757d; color: white; }
        .btn-prev:hover { background-color: #5a6268; }
        .btn-next, .btn-submit { background-color: #007bff; color: white; }
        .btn-next:hover, .btn-submit:hover { background-color: #0056b3; }
        .btn-submit { background-color: #28a745; display: none; }
        .btn-submit:hover { background-color: #218838; }

        #successMessage { text-align: center; display: none; }
        #successMessage h3 { color: #28a745; }
    </style>
</head>
<body>

<div class="container">
    <div id="formSection">
        <h2>Đăng Ký Tài Khoản</h2>
        
        <div class="step-indicator" id="stepText">Bước 1 / 3</div>
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>

        <form id="multiStepForm">
            <div class="step active" id="step1">
                <div class="form-group">
                    <label for="fullname">Họ và tên</label>
                    <input type="text" id="fullname" placeholder="Nhập họ và tên">
                    <span class="error-message" id="fullname-error"></span>
                </div>
                <div class="form-group">
                    <label for="dob">Ngày sinh</label>
                    <input type="date" id="dob">
                    <span class="error-message" id="dob-error"></span>
                </div>
                <div class="form-group">
                    <label>Giới tính</label>
                    <div class="radio-group">
                        <label><input type="radio" name="gender" value="Nam"> Nam</label>
                        <label><input type="radio" name="gender" value="Nữ"> Nữ</label>
                        <label><input type="radio" name="gender" value="Khác"> Khác</label>
                    </div>
                    <span class="error-message" id="gender-error"></span>
                </div>
            </div>

            <div class="step" id="step2">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="name@domain.com">
                    <span class="error-message" id="email-error"></span>
                </div>
                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input type="password" id="password" placeholder="Tối thiểu 6 ký tự">
                    <span class="error-message" id="password-error"></span>
                </div>
                <div class="form-group">
                    <label for="confirmPassword">Xác nhận mật khẩu</label>
                    <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                    <span class="error-message" id="confirmPassword-error"></span>
                </div>
            </div>

            <div class="step" id="step3">
                <div class="summary-box">
                    <p><strong>Họ và tên:</strong> <span id="sumFullname"></span></p>
                    <p><strong>Ngày sinh:</strong> <span id="sumDob"></span></p>
                    <p><strong>Giới tính:</strong> <span id="sumGender"></span></p>
                    <p><strong>Email:</strong> <span id="sumEmail"></span></p>
                </div>
            </div>

            <div class="buttons">
                <button type="button" class="btn-prev" id="prevBtn" style="display: none;">Quay lại</button>
                <button type="button" class="btn-next" id="nextBtn">Tiếp theo</button>
                <button type="submit" class="btn-submit" id="submitBtn">Xác nhận Đăng ký</button>
            </div>
        </form>
    </div>

    <div id="successMessage">
        <h3 style="font-size: 24px; margin-bottom: 10px;"> Thành công!</h3>
        <p>Tài khoản của bạn đã được tạo.</p>
    </div>
</div>

<script>
    let currentStep = 1;
    const totalSteps = 3;

    function showError(fieldId, message) {
        document.getElementById(fieldId + '-error').innerText = message;
        const el = document.getElementById(fieldId);
        if (el && el.type !== 'radio') el.classList.add('is-invalid');
    }

    function clearError(fieldId) {
        document.getElementById(fieldId + '-error').innerText = '';
        const el = document.getElementById(fieldId);
        if (el && el.type !== 'radio') el.classList.remove('is-invalid');
    }

    function validateStep1() {
        let isValid = true;
        
        const fullname = document.getElementById('fullname').value.trim();
        if (!fullname) { showError('fullname', 'Vui lòng nhập họ và tên'); isValid = false; }
        else { clearError('fullname'); }

        const dob = document.getElementById('dob').value;
        if (!dob) { showError('dob', 'Vui lòng chọn ngày sinh'); isValid = false; }
        else { clearError('dob'); }

        const gender = document.querySelector('input[name="gender"]:checked');
        if (!gender) { showError('gender', 'Vui lòng chọn giới tính'); isValid = false; }
        else { clearError('gender'); }

        return isValid;
    }

    function validateStep2() {
        let isValid = true;

        const email = document.getElementById('email').value.trim();
        const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
        if (!email || !emailRegex.test(email)) { 
            showError('email', 'Email không hợp lệ'); isValid = false; 
        } else { clearError('email'); }

        const password = document.getElementById('password').value;
        if (password.length < 6) { 
            showError('password', 'Mật khẩu phải từ 6 ký tự trở lên'); isValid = false; 
        } else { clearError('password'); }

        const confirmPassword = document.getElementById('confirmPassword').value;
        if (!confirmPassword || confirmPassword !== password) { 
            showError('confirmPassword', 'Mật khẩu xác nhận không khớp'); isValid = false; 
        } else { clearError('confirmPassword'); }

        return isValid;
    }

    function updateSummary() {
        document.getElementById('sumFullname').innerText = document.getElementById('fullname').value;
        
        const dobStr = document.getElementById('dob').value;
        const dobParts = dobStr.split('-');
        document.getElementById('sumDob').innerText = `${dobParts[2]}/${dobParts[1]}/${dobParts[0]}`;
        
        document.getElementById('sumGender').innerText = document.querySelector('input[name="gender"]:checked').value;
        document.getElementById('sumEmail').innerText = document.getElementById('email').value;
    }

    function showStep(step) {
        document.querySelectorAll('.step').forEach((el, index) => {
            el.classList.toggle('active', index + 1 === step);
        });

        document.getElementById('stepText').innerText = `Bước ${step} / ${totalSteps}`;
        document.getElementById('progressBar').style.width = `${((step - 1) / (totalSteps - 1)) * 100}%`;

        document.getElementById('prevBtn').style.display = step === 1 ? 'none' : 'inline-block';
        
        if (step === totalSteps) {
            document.getElementById('nextBtn').style.display = 'none';
            document.getElementById('submitBtn').style.display = 'inline-block';
            updateSummary();
        } else {
            document.getElementById('nextBtn').style.display = 'inline-block';
            document.getElementById('submitBtn').style.display = 'none';
        }
    }

    document.getElementById('nextBtn').addEventListener('click', () => {
        if (currentStep === 1 && !validateStep1()) return;
        if (currentStep === 2 && !validateStep2()) return;
        
        currentStep++;
        showStep(currentStep);
    });

    document.getElementById('prevBtn').addEventListener('click', () => {
        currentStep--;
        showStep(currentStep);
    });

    document.querySelectorAll('#step1 input').forEach(input => {
        input.addEventListener('input', () => clearError(input.id || input.name));
        input.addEventListener('change', () => clearError(input.id || input.name));
    });
    
    document.querySelectorAll('#step2 input').forEach(input => {
        input.addEventListener('input', () => clearError(input.id));
    });

    document.getElementById('multiStepForm').addEventListener('submit', (e) => {
        e.preventDefault();
        document.getElementById('formSection').style.display = 'none';
        document.getElementById('successMessage').style.display = 'block';
    });

    showStep(currentStep);
</script>

</body>
</html>
